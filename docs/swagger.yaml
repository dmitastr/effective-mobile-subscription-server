definitions:
  objects.AddSubscriptionRequest:
    properties:
      subscription:
        $ref: '#/definitions/objects.SubscriptionPayload'
    type: object
  objects.AddSubscriptionResponse:
    type: object
  objects.DeleteSubscriptionResponse:
    type: object
  objects.ErrorResponse:
    type: object
  objects.GetSubscriptionResponse:
    properties:
      subscriptions:
        items:
          $ref: '#/definitions/objects.SubscriptionPayload'
        type: array
    type: object
  objects.SubscriptionPayload:
    properties:
      end_date:
        example: 11-2021
        type: string
      id:
        type: integer
      price:
        example: 100
        type: integer
      service_name:
        example: yandex
        type: string
      start_date:
        example: 10-2020
        type: string
      user_id:
        example: 019e5b65-04a0-7833-bd67-856ea7d20900
        type: string
    type: object
  objects.SubscriptionSumResponse:
    properties:
      from_date:
        example: "2020-10-01"
        type: string
      subscription:
        example: yandex
        type: string
      sum:
        example: 10
        type: integer
      to_date:
        example: "2021-11-01"
        type: string
      user_id:
        example: 019e5b65-04a0-7833-bd67-856ea7d20900
        type: string
    type: object
  objects.UpdateSubscriptionResponse:
    type: object
info:
  contact: {}
paths:
  /subscription:
    get:
      description: Get subscriptions by user_id or sub name
      parameters:
      - description: user id in UUID string format
        in: query
        name: user_id
        type: string
      - description: subscription name
        in: query
        name: subscription_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/objects.GetSubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
      summary: Get subscriptions
      tags:
      - subscription
    post:
      description: Add new subscription
      parameters:
      - description: SubscriptionPayload payload
        in: body
        name: subscription
        required: true
        schema:
          $ref: '#/definitions/objects.AddSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/objects.AddSubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
      summary: Add new subscription
      tags:
      - subscription
  /subscription/{id}:
    delete:
      description: delete subscription by id
      parameters:
      - description: subscription id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/objects.DeleteSubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
      summary: delete subscription
      tags:
      - subscription
    put:
      description: update subscription data
      parameters:
      - description: subscription id
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/objects.UpdateSubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
      summary: update subscription data
      tags:
      - subscription
  /subscription/aggregate:
    get:
      description: get sum of specified subscriptions for a user in certain period
      parameters:
      - description: user id
        in: query
        name: user_id
        required: true
        type: string
      - description: subscription name
        in: query
        name: subscription
        required: true
        type: string
      - description: Min starting date of subscription (YYYY-MM-DD)
        example: "2025-08-02"
        format: date
        in: query
        name: from_date
        required: true
        type: string
      - description: Min starting date of subscription (YYYY-MM-DD)
        example: "2025-08-02"
        format: date
        in: query
        name: to_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/objects.SubscriptionSumResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/objects.ErrorResponse'
      summary: get aggregate data
      tags:
      - subscription
swagger: "2.0"
